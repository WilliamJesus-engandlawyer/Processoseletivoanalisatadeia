version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gamevault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123     # ← mude aqui se quiser outra senha
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
      
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
